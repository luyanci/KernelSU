name: Release ksud

on:
 workflow_dispatch:
 push:
    branches:
      - main # default branch
    paths:
      - userspace/ksud/**/**
      - .github/workflows/ksud-releases.yml

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Set builddate
        id: generate-builddate
        run: echo "BUILDDATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
  build-lkm:
    uses: ./.github/workflows/build-lkm.yml
    secrets: inherit

  build-ksud:
    needs: build-lkm
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            os: ubuntu-latest
          - target: x86_64-linux-android
            os: ubuntu-latest
          - target: x86_64-pc-windows-gnu # windows pc
            os: ubuntu-latest
          - target: x86_64-apple-darwin # Intel mac
            os: macos-latest
          - target: aarch64-apple-darwin # M chip mac
            os: macos-latest
          - target: aarch64-unknown-linux-musl # arm64 Linux
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl # x86 Linux
            os: ubuntu-latest
    uses: ./.github/workflows/ksud.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}  
  release:
    needs: build-ksud
    env: 
      TIME: '${{ needs.setup.outputs.BUILD_DATE }}'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            os: ubuntu-latest
          - target: x86_64-linux-android
            os: ubuntu-latest
          - target: x86_64-pc-windows-gnu # windows pc
            os: ubuntu-latest
          - target: x86_64-apple-darwin # Intel mac
            os: macos-latest
          - target: aarch64-apple-darwin # M chip mac
            os: macos-latest
          - target: aarch64-unknown-linux-musl # arm64 Linux
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl # x86 Linux
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Get Current Time
        run: |
          TIME=$(date +"%Y%m%d")
          echo "TIME=$TIME" >> $GITHUB_ENV
      - name: Download Artifact
        uses: actions/download-artifact@v4.1.7
        with:
            name: ksud-${{ matrix.target }}
      - name: Package (${{ matrix.target }})
        run: |
         7z a -tzip ksud-${{ matrix.target }}.zip ./${{ matrix.target }}/release
      - name: Create Release
        uses: softprops/action-gh-release@v2.0.4
        with:
            prerelease: true
            name: 'ksud-${{ env.TIME }}.${{ github.run_number }}'
            tag_name: 'v${{ env.TIME }}.${{ github.run_number }}'
            body: 'ksud-build-UNOFFICAL-${{ env.TIME }}.${{ github.run_number }}'
            files: ./**/ksud-*.zip
  build-ksud-deb:
    needs: build-ksud
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64
            os: ubuntu-latest
          - target: x86_64
            os: ubuntu-latest
    env:
       target: ${{ matrix.target }}-unknown-linux-musl
       TIME: '${{ needs.setup.outputs.BUILD_DATE }}'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.1.4
        with:
          repository: 'vc-teahouse/ksud-amd64-debian-base'
          ref: ${{ matrix.target }}
      - name: Install alien
        run: |
          sudo apt update
          sudo apt-get install alien
      - name: Get Current Time
        run: |
          TIME=$(date +"%Y%m%d")
          echo "TIME=$TIME" >> $GITHUB_ENV
      - name: Download Artifact
        uses: actions/download-artifact@v4.1.7
        with:
            name: ksud-${{ env.target }}
      - name: copy
        run: |
          mkdir -p usr/local/bin
          cp ${{ env.target }}/release/ksud usr/local/bin/
          chmod +x usr/local/bin/ksud
      - name: Clean work dir
        run: |
          rm -rf ${{ env.target }}
          rm -rf .git
          rm README.md
      - name: pack it!
        run: |
          dpkg-deb --build --root-owner-group .
          mv ..deb ksud-${{ env.target }}.deb
      - name: Run deb2rpm
        run: |
          sudo alien -r --scripts ksud-${{ env.target }}.deb
      - name: Upload Artifact
        uses: actions/upload-artifact@v4.3.3
        with:
          name: ksud-${{ env.target }}-packed
          path: ./ksud-*.*
      - name: Create Release
        uses: softprops/action-gh-release@v2.0.4
        with:
            prerelease: true
            name: 'ksud-${{ env.TIME }}.${{ github.run_number }}'
            tag_name: 'v${{ env.TIME }}.${{ github.run_number }}'
            body: 'ksud-build-UNOFFICAL-${{ env.TIME }}.${{ github.run_number }}'
            files: ./**/ksud-*.*